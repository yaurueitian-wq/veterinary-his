databases:
  - name: his-db
    plan: free
    databaseName: his
    user: his_user

services:
  - type: web
    name: his-backend
    plan: free
    rootDir: backend
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: his-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://his-frontend-p2ep.onrender.com
      - key: LLM_API_KEY
        value: disabled
      - key: LLM_BASE_URL
        value: ""
      - key: LLM_MODEL
        value: ""

  - type: web
    name: his-frontend
    plan: free
    rootDir: frontend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: VITE_API_BASE_URL
        value: https://his-backend-bjcp.onrender.com
