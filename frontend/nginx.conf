server {
    listen LISTEN_PORT;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: 所有非檔案路由都導向 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 靜態資源快取
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 禁止存取隱藏檔
    location ~ /\. {
        deny all;
    }
}
